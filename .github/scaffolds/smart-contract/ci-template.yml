name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  ci:
    name: Install · Compile · Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Type check
        run: npm run typecheck
      - name: Compile contracts
        run: npm run compile
      - name: Run tests
        run: npm test
